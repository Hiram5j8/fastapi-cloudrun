<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Upload XLS</title>
</head>

<body>

  <h2>Upload Excel + ZIP</h2>

  <!-- VERSION -->
  <div id="version" style="
    font-size:18px;
    font-weight:bold;
    color:blue;
    margin-bottom:20px;
  ">
    VERSION LOADING...
  </div>

  <!-- FORM -->
  <form id="form">

    <!-- BASE XLS -->
    <input
      type="file"
      name="base_xls"
      accept=".xls,.xlsx">
    <br><br>

    <!-- DATA ZIP -->
    <input
      type="file"
      name="data_zip"
      accept=".zip">
    <br><br>

    <!-- BUTTON -->
    <button type="submit">
      Upload
    </button>

  </form>

  <br>

  <!-- RESULT -->
  <pre id="result"></pre>

  <!-- VERSION SCRIPT -->
  <script>

    async function loadVersion() {

      try {

        const res = await fetch("/version");

        const data = await res.json();

        document.getElementById("version").innerText =
          "VERSION : " + data.version;

      } catch (err) {

        document.getElementById("version").innerText =
          "VERSION LOAD ERROR";

      }

    }

    loadVersion();

  </script>

  <!-- UPLOAD SCRIPT -->
  <script>

    const form = document.getElementById("form");

    form.onsubmit = async (e) => {

      e.preventDefault();

      document.getElementById("result").textContent =
        "¤W¶Ē¤¤...";

      try {

        const formData = new FormData(form);

        const res = await fetch("/process", {
          method: "POST",
          body: formData
        });

        if (!res.ok) {

          document.getElementById("result").textContent =
            "³B²z„¢±Ń";

          return;
        }

        // Øś±oĄÉ®×øź®Ę
        const blob = await res.blob();

        document.getElementById("result").textContent =
          "¤Uøü§¹¦Ø";

        // «Ų„ß¤Uøü³sµ²
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");

        a.href = url;

        // §ļ¦Ø XLSX
        a.download = "result.xlsx";

        // ¦Ū°Ź¤Uøü
        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        // ÄĄ©ń°O¾ŠÅé
        window.URL.revokeObjectURL(url);

      } catch (err) {

        console.error(err);

        document.getElementById("result").textContent =
          "µo„Ķæł»~";

      }

    };

  </script>

</body>

</html>
