<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Upload Test</title>
</head>

<body>

  <h2>Upload Excel + ZIP</h2>

  <!-- 日期時間 -->
  <div id="datetime" style="
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
    color:#333;
  ">
    載入時間中...
  </div>
<div id="version"></div>

<script>

async function loadVersion() {

  const res = await fetch("/version");

  const data = await res.json();

  document.getElementById("version").innerText =
    data.version;
}

loadVersion();

</script>
  <form id="form">
    <input type="file" name="base_xls"><br><br>
    <input type="file" name="data_zip"><br><br>
    <button type="submit">Upload</button><br><br>
	<div id="version" style="
  	font-size:18px;
  	font-weight:bold;
  	color:blue;
  	margin-bottom:20px;
	">
  	VERSION LOADING...
	</div>
  </form>

  <pre id="result"></pre>

  <script>

    // =========================
    // 日期時間
    // =========================
    function updateDateTime() {

      const now = new Date();

      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');

      const hour = String(now.getHours()).padStart(2, '0');
      const minute = String(now.getMinutes()).padStart(2, '0');
      const second = String(now.getSeconds()).padStart(2, '0');

      const text =
        `${year}-${month}-${day} ` +
        `${hour}:${minute}:${second}`;

      document.getElementById("datetime").innerText = text;
    }

    // 初始化
    updateDateTime();

    // 每秒更新
    setInterval(updateDateTime, 1000);


    // =========================
    // Upload
    // =========================
    const form = document.getElementById("form");

    form.onsubmit = async (e) => {

      e.preventDefault();

      document.getElementById("result").textContent =
        "檔案處理中，請稍候...";

      const formData = new FormData(form);

      const res = await fetch("/process", {
        method: "POST",
        body: formData
      });

      const blob = await res.blob();

      document.getElementById("result").textContent =
        "下載完成（result.txt）";

      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");

      a.href = url;

      // TXT
      a.download = "result.txt";

      a.click();
    };

  </script>

</body>
</html>
