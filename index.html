<!DOCTYPE html>
<html>
<body>
<h2>ЄWЖЧРЩЎзХ§ЖГКн Python ГBВz</h2>

<input type="file" id="fileInput">
<button onclick="upload()">ЄWЖЧЈУГBВz</button>

<script>
function upload() {
    const file = document.getElementById("fileInput").files[0];
    const formData = new FormData();
    formData.append("file", file);

    fetch("https://fastapi-service-445636251861.asia-east1.run.app/process-file", {
        method: "POST",
        body: formData
    })
    .then(res => res.blob())
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "processed_" + file.name;
        a.click();
    });
}
</script>

</body>
</html>
